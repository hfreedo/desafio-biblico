<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desafío Bíblico — Pantalla</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--gold:#D4A843;--gold-l:#F0C96A;--gold-d:#9A7420;--deep:#08090F;--navy:#0D1B3E;--green:#2ECC71;--blue:#3498DB;--red:#E74C3C;--parchment:#F5E6C8;--parchment2:#EDD9A3;--white:#FDFAF2;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{background:var(--deep);font-family:'Cinzel',serif;color:var(--white);display:flex;flex-direction:column;height:100vh;}
canvas.bg-c{position:fixed;inset:0;z-index:0;}
.cross-bg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:700px;height:700px;opacity:.022;z-index:1;pointer-events:none;}
#particles{position:fixed;inset:0;z-index:1;pointer-events:none;}
.wrap{position:relative;z-index:2;display:flex;flex-direction:column;height:100%;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 40px 12px;border-bottom:1px solid rgba(212,168,67,.3);background:linear-gradient(180deg,rgba(13,27,62,.97),rgba(13,27,62,.65));backdrop-filter:blur(14px);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:16px;}
.logo-icon{width:54px;height:54px;background:linear-gradient(135deg,var(--gold),var(--gold-d));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 28px rgba(212,168,67,.5);}
.logo-title{font-family:'Cinzel Decorative',serif;font-size:22px;color:var(--gold-l);text-shadow:0 0 24px rgba(212,168,67,.6);letter-spacing:3px;}
.logo-sub{font-size:12px;color:rgba(212,168,67,.55);letter-spacing:4px;font-family:'Crimson Text',serif;margin-top:2px;}
.round-info{text-align:center;}
.round-badge{background:linear-gradient(135deg,rgba(212,168,67,.2),rgba(212,168,67,.05));border:1px solid rgba(212,168,67,.4);border-radius:40px;padding:8px 28px;font-size:16px;color:var(--gold-l);letter-spacing:3px;}
.round-name{font-size:14px;color:rgba(240,201,106,.6);text-align:center;margin-top:4px;font-family:'Crimson Text',serif;font-style:italic;}

/* TEAMS */
.teams-bar{display:flex;gap:20px;padding:14px 30px;flex-shrink:0;align-items:stretch;}
.team-card{flex:1;border-radius:14px;padding:16px 30px;display:flex;align-items:center;justify-content:space-between;gap:20px;position:relative;overflow:hidden;transition:all .4s;}
.team-card.ta{background:linear-gradient(135deg,rgba(27,107,58,.55),rgba(27,107,58,.18));border:2px solid rgba(46,204,113,.28);}
.team-card.tb{background:linear-gradient(135deg,rgba(26,58,107,.55),rgba(26,58,107,.18));border:2px solid rgba(52,152,219,.28);}
.team-card.pa{border-color:rgba(46,204,113,.9)!important;animation:gA 1.4s ease-in-out infinite;}
.team-card.pb{border-color:rgba(52,152,219,.9)!important;animation:gB 1.4s ease-in-out infinite;}
@keyframes gA{0%,100%{box-shadow:0 0 50px rgba(46,204,113,.3)}50%{box-shadow:0 0 90px rgba(46,204,113,.75)}}
@keyframes gB{0%,100%{box-shadow:0 0 50px rgba(52,152,219,.3)}50%{box-shadow:0 0 90px rgba(52,152,219,.75)}}
.tn{font-family:'Cinzel Decorative',serif;font-size:clamp(18px,2.2vw,30px);letter-spacing:1px;}
.ta .tn{color:var(--green);}
.tb .tn{color:var(--blue);}
.tst{font-size:15px;margin-top:5px;font-family:'Crimson Text',serif;font-style:italic;opacity:.65;}
.ts-num{font-family:'Cinzel Decorative',serif;font-size:clamp(58px,8vw,100px);font-weight:900;line-height:1;min-width:90px;text-align:center;}
.ta .ts-num{color:var(--green);text-shadow:0 0 30px rgba(46,204,113,.55);}
.tb .ts-num{color:var(--blue);text-shadow:0 0 30px rgba(52,152,219,.55);}
.vs-div{display:flex;align-items:center;padding:0 6px;flex-shrink:0;}
.vs-txt{font-family:'Cinzel Decorative',serif;font-size:28px;color:var(--gold);text-shadow:0 0 24px rgba(212,168,67,.8);opacity:.75;}
.spop{position:fixed;font-size:40px;font-family:'Cinzel Decorative',serif;font-weight:900;pointer-events:none;animation:pop 1.3s ease-out forwards;z-index:200;}
.spop.plus{color:#2ECC71;}.spop.minus{color:#E74C3C;}
@keyframes pop{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-90px) scale(1.7)}}

/* QUESTION AREA */
.q-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 50px;gap:20px;min-height:0;}
.diff-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 26px;border-radius:30px;font-size:15px;letter-spacing:3px;font-weight:600;}
.df{background:rgba(46,204,113,.15);border:1px solid rgba(46,204,113,.5);color:#2ECC71;}
.dm{background:rgba(241,196,15,.15);border:1px solid rgba(241,196,15,.5);color:#F1C40F;}
.dd{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.5);color:#E74C3C;}
.q-num{font-size:15px;color:rgba(212,168,67,.55);letter-spacing:5px;font-family:'Crimson Text',serif;}
.q-text{font-family:'Crimson Text',serif;font-size:clamp(32px,4.5vw,64px);font-weight:600;text-align:center;color:var(--parchment);line-height:1.35;max-width:1100px;text-shadow:0 3px 28px rgba(0,0,0,.5);}
.deco{width:260px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.55;}
.ans-lbl{font-size:13px;color:rgba(212,168,67,.45);letter-spacing:4px;margin-top:4px;}
.ans-box{font-family:'Cinzel',serif;font-size:clamp(22px,3vw,42px);font-weight:700;color:var(--gold-l);text-align:center;padding:18px 50px;background:linear-gradient(135deg,rgba(212,168,67,.15),rgba(212,168,67,.05));border:2px solid rgba(212,168,67,.45);border-radius:14px;max-width:900px;min-height:78px;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(12px);transition:all .5s;}
.ans-box.show{opacity:1;transform:translateY(0);}

/* IDLE */
.idle{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;flex:1;}
.idle-icon{font-size:90px;opacity:.7;animation:fl 4s ease-in-out infinite;}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.idle-title{font-family:'Cinzel Decorative',serif;font-size:clamp(40px,6.5vw,88px);font-weight:900;color:var(--gold-l);text-align:center;text-shadow:0 0 50px rgba(212,168,67,.65),0 0 100px rgba(212,168,67,.2);letter-spacing:4px;animation:glo 3s ease-in-out infinite;}
@keyframes glo{0%,100%{text-shadow:0 0 50px rgba(212,168,67,.6)}50%{text-shadow:0 0 90px rgba(212,168,67,1),0 0 160px rgba(212,168,67,.4)}}
.idle-sub{font-family:'Crimson Text',serif;font-style:italic;font-size:24px;color:rgba(245,230,200,.5);text-align:center;letter-spacing:2px;}
.dots span{animation:bk 1.4s infinite;opacity:0;}.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes bk{0%,80%,100%{opacity:0}40%{opacity:1}}

/* TIMER */
.timer-sec{display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0;padding:4px 20px 20px;}
.tring-c{position:relative;width:170px;height:170px;}
.t-svg{transform:rotate(-90deg);width:170px;height:170px;}
.t-track{fill:none;stroke:rgba(255,255,255,.07);stroke-width:11;}
.t-prog{fill:none;stroke-width:11;stroke-linecap:round;stroke:var(--gold);transition:stroke-dashoffset 1s linear,stroke .5s;}
.t-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.t-num{font-family:'Cinzel Decorative',serif;font-size:56px;font-weight:900;color:var(--gold-l);line-height:1;transition:color .3s;text-shadow:0 0 28px rgba(212,168,67,.55);}
.t-num.danger{color:var(--red)!important;text-shadow:0 0 30px rgba(231,76,60,.9)!important;animation:dp .45s ease-in-out infinite;}
@keyframes dp{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
.t-lbl{font-size:12px;color:rgba(255,255,255,.35);letter-spacing:3px;}

/* BUZZER BANNER */
.bz{position:fixed;top:0;left:0;right:0;padding:24px;text-align:center;font-family:'Cinzel Decorative',serif;font-size:clamp(22px,3.5vw,38px);font-weight:900;z-index:50;transform:translateY(-100%);transition:transform .4s cubic-bezier(.34,1.56,.64,1);letter-spacing:3px;}
.bz.show{transform:translateY(0);}
.bz.ba{background:linear-gradient(135deg,#1B6B3A,#2ECC71);color:#fff;}
.bz.bb{background:linear-gradient(135deg,#1A3A6B,#3498DB);color:#fff;}

/* WRONG FLASH */
.wf{position:fixed;inset:0;z-index:60;pointer-events:none;background:rgba(231,76,60,0);display:flex;align-items:center;justify-content:center;}
.wf.show{animation:wfa .9s ease-out forwards;}
@keyframes wfa{0%{background:rgba(231,76,60,0)}15%{background:rgba(231,76,60,.35)}100%{background:rgba(231,76,60,0)}}
.wf .wi{font-size:160px;opacity:0;}
.wf.show .wi{animation:wia .9s ease-out forwards;}
@keyframes wia{0%{opacity:0;transform:scale(.3)}15%{opacity:1;transform:scale(1.3)}60%{opacity:.8;transform:scale(1)}100%{opacity:0}}

/* BOMB OVERLAY */
.bomb-ov{position:fixed;inset:0;z-index:70;pointer-events:none;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;}
.bomb-ov.boom{animation:bma .85s ease-out forwards;}
@keyframes bma{0%{background:rgba(0,0,0,0)}10%{background:rgba(255,220,0,.2)}50%{background:rgba(231,76,60,.45)}100%{background:rgba(0,0,0,0)}}
.bomb-ico{font-size:180px;opacity:0;pointer-events:none;}
.bomb-ov.boom .bomb-ico{animation:bia 1.1s ease-out forwards;}
@keyframes bia{0%{opacity:0;transform:scale(.2)}12%{opacity:1;transform:scale(1.6)}45%{opacity:1;transform:scale(1)}100%{opacity:0}}

/* WINNER */
.won-ov{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;background:radial-gradient(ellipse at center,rgba(13,27,62,.97),rgba(8,8,15,.99));opacity:0;pointer-events:none;transition:opacity .8s;}
.won-ov.show{opacity:1;pointer-events:all;}
.won-trophy{font-size:110px;animation:wt 1s ease-out;}
@keyframes wt{0%{transform:scale(0) rotate(-180deg)}80%{transform:scale(1.25) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
.won-title{font-family:'Cinzel Decorative',serif;font-size:26px;color:var(--gold);letter-spacing:4px;}
.won-name{font-family:'Cinzel Decorative',serif;font-size:clamp(42px,7.5vw,80px);font-weight:900;text-align:center;animation:wng 2s ease-in-out infinite;}
@keyframes wng{0%,100%{filter:brightness(1)}50%{filter:brightness(1.4) drop-shadow(0 0 28px rgba(212,168,67,.8))}}
.won-score{font-size:34px;color:var(--parchment2);font-family:'Cinzel',serif;}
.won-verse{font-family:'Crimson Text',serif;font-style:italic;font-size:23px;color:rgba(245,230,200,.55);margin-top:8px;text-align:center;max-width:700px;}

/* MISC */
.q-wrap{display:none;width:100%;flex-direction:column;align-items:center;gap:16px;}
.q-wrap.active{display:flex;}
.cftti{position:fixed;pointer-events:none;animation:cff linear forwards;}
@keyframes cff{0%{opacity:1}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
</style>
</head>
<body>
<canvas class="bg-c" id="bgC"></canvas>
<canvas id="particles"></canvas>
<svg class="cross-bg" viewBox="0 0 100 100"><rect x="40" y="5" width="20" height="90" fill="white"/><rect x="10" y="25" width="80" height="20" fill="white"/></svg>

<div class="bz" id="bzBanner"></div>
<div class="wf" id="wrongFlash"><div class="wi">✗</div></div>
<div class="bomb-ov" id="bombOv"><div class="bomb-ico">💥</div></div>
<div class="won-ov" id="wonOv"></div>

<div class="wrap">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg width="52" height="52" viewBox="0 0 400 400" style="border-radius:50%;overflow:hidden;">
          <defs>
            <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
            </linearGradient>
          </defs>
          <!-- Black background -->
          <rect width="400" height="400" fill="#000"/>
          <!-- Top text "JÓVENES UNIVERSITARIOS" -->
          <text x="200" y="70" text-anchor="middle" fill="url(#goldGrad)" font-family="Arial, sans-serif" font-weight="700" font-size="20">JÓVENES UNIVERSITARIOS</text>
          <!-- Main "JU" letters -->
          <text x="200" y="220" text-anchor="middle" fill="url(#goldGrad)" font-family="Arial, sans-serif" font-weight="900" font-size="120">JU</text>
          <!-- Eagle silhouette at bottom -->
          <path fill="#1B3A6B" d="M80 280 Q200 320 320 280 Q290 340 200 360 Q110 340 80 280 Z"/>
          <ellipse fill="#1B3A6B" cx="200" cy="295" rx="6" ry="3"/>
          <path fill="#1B3A6B" d="M60 285 Q80 305 100 285 Q95 315 75 325 Q55 315 60 285"/>
          <path fill="#1B3A6B" d="M300 285 Q320 305 340 285 Q345 315 325 325 Q305 315 300 285"/>
        </svg>
      </div>
      <div><div class="logo-title">Desafío Bíblico</div><div class="logo-sub">Quiz Competencia</div></div>
    </div>
    <div class="round-info">
      <div class="round-badge" id="roundBadge">RONDA 1</div>
      <div class="round-name" id="roundName">Rápido y Preciso</div>
    </div>
    <div style="width:200px"></div>
  </div>

  <div class="teams-bar">
    <div class="team-card ta" id="cardA">
      <div><div class="tn" id="nameA">EQUIPO A</div><div class="tst" id="stA">Listos para competir</div></div>
      <div class="ts-num" id="scoreA">0</div>
    </div>
    <div class="vs-div"><div class="vs-txt">VS</div></div>
    <div class="team-card tb" id="cardB">
      <div class="ts-num" id="scoreB">0</div>
      <div style="text-align:right"><div class="tn" id="nameB">EQUIPO B</div><div class="tst" id="stB">Listos para competir</div></div>
    </div>
  </div>

  <div class="q-area">
    <div class="idle" id="idle">
      <div class="idle-icon">✝</div>
      <div class="idle-title">DESAFÍO<br>BÍBLICO</div>
      <div class="idle-sub">Esperando la próxima pregunta<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
    </div>
    <div class="q-wrap" id="qWrap">
      <div style="display:flex;align-items:center;gap:18px;">
        <div class="diff-badge" id="diffBadge">FÁCIL</div>
        <div style="font-size:14px;color:rgba(212,168,67,.5);letter-spacing:3px;" id="roundLbl">RONDA 1</div>
      </div>
      <div class="q-num" id="qNum">PREGUNTA 1 DE 100</div>
      <div class="deco"></div>
      <div class="q-text" id="qText">¿Quién construyó el arca?</div>
      <div class="deco"></div>
      <div class="ans-lbl">RESPUESTA</div>
      <div class="ans-box" id="ansBox">Noé — Génesis 6:13-14</div>
    </div>
  </div>

  <div class="timer-sec" id="timerSec" style="display:none">
    <div class="tring-c">
      <svg class="t-svg" viewBox="0 0 170 170">
        <circle class="t-track" cx="85" cy="85" r="74"/>
        <circle class="t-prog" id="tRing" cx="85" cy="85" r="74" stroke-dasharray="465" stroke-dashoffset="0"/>
      </svg>
      <div class="t-center">
        <div class="t-num" id="tNum">30</div>
        <div class="t-lbl">SEG</div>
      </div>
    </div>
  </div>
</div>

<div id="ytHolder" style="position:fixed;bottom:-300px;left:-300px;width:1px;height:1px;overflow:hidden;pointer-events:none;"></div>

<script>
const CIRC=465;
const S={scoreA:0,scoreB:0,nameA:'EQUIPO A',nameB:'EQUIPO B',timerTotal:30,timerLeft:30,sounds:true};
let timerInt=null;

/* ── SUPABASE INTEGRATION FOR REMOTE EVENTS ── */
const SUPABASE_URL = 'https://cnazxzkbckpqficngjex.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYXp4emtiY2twcWZpY25namV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjA4OTIsImV4cCI6MjA5MTQ5Njg5Mn0.7b6G0O107iGSSYpDwKXd9LTcNRdey3XbQN5ielqbFZw';

let pollInterval=null;
let lastTs=Date.now();
let currentRoom='';

async function pollSupabaseEvents(){
  if(!currentRoom||!SUPABASE_URL) return;
  try{
    const url = `${SUPABASE_URL}/rest/v1/quiz_events?room=eq.${currentRoom}&ts=gt.${lastTs}&order=ts.asc`;
    const r=await fetch(url,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    
    if(!r.ok) return;
    
    const data=await r.json();
    if(Array.isArray(data)&&data.length){
      console.log('📨 Display received remote events:', data.length);
      data.forEach(row=>{
        try{
          const msg = JSON.parse(row.payload);
          console.log('📨 Processing remote message:', msg.type);
          handle(msg); // Process the message like local events
        }catch(e){
          console.error('❌ Parse error:', e);
        }
      });
      lastTs=data[data.length-1].ts;
    }
  }catch(e){
    console.error('❌ Remote poll error:', e);
  }
}

function startRemoteMode(room){
  if(!room || room === currentRoom) return;
  currentRoom = room;
  lastTs = Date.now();
  if(pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(pollSupabaseEvents, 800);
  console.log('🌐 Display listening to remote room:', room);
}

function stopRemoteMode(){
  if(pollInterval) clearInterval(pollInterval);
  currentRoom = '';
  console.log('🌐 Display stopped remote mode');
}

const ch=new BroadcastChannel('quiz_channel');
ch.onmessage=e=>handle(e.data);

function handle(m){
  switch(m.type){
    case 'SHOW_QUESTION': showQ(m);break;
    case 'SHOW_ANSWER':   revealAns();break;
    case 'HIDE_QUESTION': hideQ();break;
    case 'UPDATE_SCORE':  updScore(m);break;
    case 'UPDATE_TEAMS':  updTeams(m);break;
    case 'START_TIMER':   startTimer(m.seconds);break;
    case 'STOP_TIMER':    stopTimer();break;
    case 'BUZZER_HIT':    showBuzzer(m);break;
    case 'SHOW_WINNER':   showWinner(m);break;
    case 'WRONG_ANSWER':  showWrong(m);break;
    case 'CLEAR_ACTIVE':  clearActive();break;
    case 'UPDATE_ROUND':  updRound(m);break;
    case 'SOUND_TOGGLE':  S.sounds=m.enabled;break;
    case 'PLAY_YT':       playYT(m.url,m.vol||0.4);break;
    case 'STOP_YT':       stopYT();break;
    case 'FADE_YT':       fadeYT();break;
    case 'START_REMOTE':  startRemoteMode(m.room);break;
    case 'STOP_REMOTE':   stopRemoteMode();break;
  }
}

function showQ(m){
  document.getElementById('idle').style.display='none';
  document.getElementById('qWrap').classList.add('active');
  const d=(m.difficulty||'').toLowerCase();
  const db=document.getElementById('diffBadge');
  db.className='diff-badge';
  db.classList.add(d.includes('fácil')||d==='facil'?'df':d.includes('medio')||d.includes('media')?'dm':'dd');
  db.textContent=m.difficulty||'NORMAL';
  document.getElementById('roundLbl').textContent=(m.round||'').toUpperCase();
  document.getElementById('qNum').textContent=`PREGUNTA ${m.index} DE ${m.total}`;
  document.getElementById('qText').textContent=m.question;
  document.getElementById('ansBox').textContent=m.answer;
  document.getElementById('ansBox').classList.remove('show');
  document.getElementById('timerSec').style.display='none';
  clearActive();
}
function revealAns(){
  document.getElementById('ansBox').classList.add('show');
  if(S.sounds) playCorrect();
}
function hideQ(){
  document.getElementById('idle').style.display='flex';
  document.getElementById('qWrap').classList.remove('active');
  document.getElementById('timerSec').style.display='none';
  stopTimer();clearActive();
}

function updScore(m){
  const pA=S.scoreA,pB=S.scoreB;
  S.scoreA=m.scoreA;S.scoreB=m.scoreB;
  animScore('scoreA',pA,m.scoreA,'cardA');
  animScore('scoreB',pB,m.scoreB,'cardB');
}
function animScore(id,prev,next,cid){
  document.getElementById(id).textContent=next;
  if(next>prev){
    const card=document.getElementById(cid);
    const r=card.getBoundingClientRect();
    const sp=document.createElement('div');
    sp.className='spop plus';sp.textContent='+'+(next-prev);
    sp.style.left=r.left+r.width/2+'px';sp.style.top=r.top+'px';
    document.body.appendChild(sp);setTimeout(()=>sp.remove(),1400);
    confetti(cid==='cardA'?'#2ECC71':'#3498DB',35);
  }
}
function updTeams(m){
  if(m.nameA){S.nameA=m.nameA;document.getElementById('nameA').textContent=m.nameA;}
  if(m.nameB){S.nameB=m.nameB;document.getElementById('nameB').textContent=m.nameB;}
}

function startTimer(s){
  stopTimer();
  S.timerTotal=s;S.timerLeft=s;
  document.getElementById('timerSec').style.display='flex';
  renderTimer();
  timerInt=setInterval(()=>{
    S.timerLeft--;
    renderTimer();
    if(S.timerLeft<=5&&S.timerLeft>0&&S.sounds) playTick();
    if(S.timerLeft<=0){stopTimer();bombExplosion();}
  },1000);
}
function stopTimer(){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  document.getElementById('tNum').classList.remove('danger');
}
function renderTimer(){
  const n=document.getElementById('tNum'),r=document.getElementById('tRing');
  n.textContent=Math.max(0,S.timerLeft);
  const pct=Math.max(0,S.timerLeft)/S.timerTotal;
  r.style.strokeDashoffset=CIRC*(1-pct);
  r.style.stroke=pct>.5?'#D4A843':pct>.25?'#E67E22':'#E74C3C';
  n.classList.toggle('danger',S.timerLeft<=5);
}

function bombExplosion(){
  const ov=document.getElementById('bombOv');
  ov.className='bomb-ov boom';
  if(S.sounds) playBomb();
  confetti('#E74C3C',70);confetti('#E67E22',50);
  setTimeout(()=>{ov.className='bomb-ov';},2200);
}

function showBuzzer(m){
  const b=document.getElementById('bzBanner');
  b.className='bz show '+(m.team==='a'?'ba':'bb');
  const nm=m.team==='a'?S.nameA:S.nameB;
  b.textContent=`🔔 ${nm.toUpperCase()} — ¡PULSÓ PRIMERO!`;
  highlightTeam(m.team);stopTimer();
  if(S.sounds) playBuzzerSfx();
  setTimeout(()=>b.classList.remove('show'),3500);
}
function showWrong(m){
  const wf=document.getElementById('wrongFlash');
  wf.className='wf';void wf.offsetWidth;wf.className='wf show';
  if(S.sounds) playWrong();
  const card=document.getElementById(m.team==='a'?'cardA':'cardB');
  card.style.animation='';void card.offsetWidth;
  card.style.animation='wshake .5s ease';
  setTimeout(()=>{wf.className='wf';card.style.animation='';},950);
}
function highlightTeam(t){
  document.getElementById('cardA').classList.remove('pa','pb');
  document.getElementById('cardB').classList.remove('pa','pb');
  if(t==='a'){document.getElementById('cardA').classList.add('pa');document.getElementById('stA').textContent='🎯 Respondiendo...';document.getElementById('stB').textContent='En espera...';}
  else if(t==='b'){document.getElementById('cardB').classList.add('pb');document.getElementById('stB').textContent='🎯 Respondiendo...';document.getElementById('stA').textContent='En espera...';}
}
function clearActive(){
  document.getElementById('cardA').classList.remove('pa','pb');
  document.getElementById('cardB').classList.remove('pa','pb');
  document.getElementById('stA').textContent='Listos para competir';
  document.getElementById('stB').textContent='Listos para competir';
}
function updRound(m){
  document.getElementById('roundBadge').textContent=m.round;
  document.getElementById('roundName').textContent=m.name;
}
function showWinner(m){
  const ov=document.getElementById('wonOv');
  const c=m.team==='a'?'#2ECC71':'#3498DB';
  ov.innerHTML=`<div class="won-trophy">🏆</div>
    <div class="won-title">¡CAMPEÓN DEL DESAFÍO BÍBLICO!</div>
    <div class="won-name" style="color:${c}">${m.name}</div>
    <div class="won-score">${m.scoreA} — ${m.scoreB}</div>
    <div class="won-verse">"Todo lo puedo en Cristo que me fortalece" — Fil. 4:13</div>`;
  ov.classList.add('show');
  for(let i=0;i<100;i++) setTimeout(()=>confetti(c,1),i*80);
}

/* YouTube */
let ytFade=null;
function playYT(url,vol=0.4){
  stopYT();
  let src='';
  const mv=url.match(/(?:v=|youtu\.be\/)([^&?/\s]+)/);
  const ml=url.match(/list=([^&?\s]+)/);
  if(ml) src=`https://www.youtube-nocookie.com/embed/videoseries?list=${ml[1]}&autoplay=1&loop=1&controls=0&rel=0&enablejsapi=0`;
  else if(mv) src=`https://www.youtube-nocookie.com/embed/${mv[1]}?autoplay=1&loop=1&playlist=${mv[1]}&controls=0&rel=0&enablejsapi=0`;
  else return;
  const h=document.getElementById('ytHolder');
  h.innerHTML=`<iframe id="ytF" width="200" height="100" src="${src}&origin=${location.origin}" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
}
function stopYT(){clearInterval(ytFade);document.getElementById('ytHolder').innerHTML='';}
function fadeYT(){
  /* iframe volume not controllable cross-origin; just fade out and stop after 2s */
  setTimeout(stopYT,2000);
}

/* Audio */
const AC=new(window.AudioContext||window.webkitAudioContext)();
document.addEventListener('click',()=>{if(AC.state==='suspended')AC.resume();},{once:true});
function resume(){if(AC.state==='suspended')AC.resume();}
function playBuzzerSfx(){resume();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='square';o.frequency.setValueAtTime(1100,AC.currentTime);o.frequency.exponentialRampToValueAtTime(550,AC.currentTime+.13);g.gain.setValueAtTime(.45,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.36);o.start();o.stop(AC.currentTime+.4);}
function playCorrect(){resume();[523,659,784,1047].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sine';o.frequency.value=f;const t=AC.currentTime+i*.11;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.28,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+.32);o.start(t);o.stop(t+.4);});}
function playWrong(){resume();[220,180,150].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sawtooth';o.frequency.value=f;const t=AC.currentTime+i*.09;g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.28);o.start(t);o.stop(t+.32);});}
function playTick(){resume();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='square';o.frequency.value=880+S.timerLeft*20;g.gain.setValueAtTime(.18,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.09);o.start();o.stop(AC.currentTime+.11);}
function playBomb(){resume();for(let i=0;i<6;i++){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.value=700+i*130;const t=AC.currentTime+i*.13;g.gain.setValueAtTime(.5,t);g.gain.exponentialRampToValueAtTime(.001,t+.11);o.start(t);o.stop(t+.13);}const buf=AC.createBuffer(1,AC.sampleRate*.9,AC.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);const s=AC.createBufferSource();s.buffer=buf;const gn=AC.createGain();gn.gain.value=.9;s.connect(gn);gn.connect(AC.destination);s.start(AC.currentTime+.78);}

/* BG Canvas */
const bgC=document.getElementById('bgC'),bgX=bgC.getContext('2d'),stars=[];
function initBg(){bgC.width=window.innerWidth;bgC.height=window.innerHeight;stars.length=0;for(let i=0;i<150;i++)stars.push({x:Math.random()*bgC.width,y:Math.random()*bgC.height,r:Math.random()*1.7+.3,a:Math.random(),s:Math.random()*.012+.004});}
function drawBg(){const w=bgC.width,h=bgC.height;bgX.clearRect(0,0,w,h);const g=bgX.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.max(w,h)/1.5);g.addColorStop(0,'#0D1B3E');g.addColorStop(.5,'#0A0A1A');g.addColorStop(1,'#050508');bgX.fillStyle=g;bgX.fillRect(0,0,w,h);stars.forEach(s=>{s.a+=s.s;bgX.beginPath();bgX.arc(s.x,s.y,s.r,0,Math.PI*2);bgX.fillStyle=`rgba(212,168,67,${(Math.sin(s.a)+1)/2*.55+.08})`;bgX.fill();});requestAnimationFrame(drawBg);}
window.addEventListener('resize',initBg);initBg();drawBg();

/* Confetti */
function confetti(color,n){for(let i=0;i<n;i++){const e=document.createElement('div');e.className='cftti';e.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${color};border-radius:${Math.random()>.5?'50%':'2px'};width:${Math.random()*13+5}px;height:${Math.random()*13+5}px;animation-duration:${Math.random()*2.5+2}s;animation-delay:${Math.random()*.6}s;`;document.body.appendChild(e);setTimeout(()=>e.remove(),5500);}}

/* Inject shake keyframe */
const ss=document.createElement('style');
ss.textContent='@keyframes wshake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-16px)}40%,80%{transform:translateX(16px)}}';
document.head.appendChild(ss);
</script>
