<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔧 Diagnóstico Supabase</title>
<style>
body{font-family:monospace;padding:20px;background:#1a1a1a;color:#fff;}
.test{margin:10px 0;padding:10px;border-radius:5px;background:#333;}
.pass{background:#2d5a27;}.fail{background:#5a2727;}.warn{background:#5a4727;}
button{padding:10px 20px;margin:5px;background:#4a90e2;color:white;border:none;border-radius:5px;cursor:pointer;}
pre{background:#000;padding:10px;overflow:auto;font-size:11px;}
</style>
</head>
<body>
<h1>🔧 Diagnóstico Supabase - Desafío Bíblico</h1>
<button onclick="runTests()">▶ Ejecutar Diagnóstico</button>
<button onclick="createTestEvent()">📤 Enviar Evento Prueba</button>
<button onclick="readEvents()">📥 Leer Eventos</button>
<button onclick="clearLog()">🗑️ Limpiar</button>

<div id="results"></div>

<script>
const SUPABASE_URL = 'https://cnazxzkbckpqficngjex.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYXp4emtiY2twcWZpY25namV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQxNzUxNjksImV4cCI6MjA0OTc1MTE2OX0.EN8Pmi_Hb7RqKrfiUGDVpQ_f6tdPyVH';

function log(message, type = 'info') {
    const results = document.getElementById('results');
    const div = document.createElement('div');
    div.className = `test ${type}`;
    div.innerHTML = message;
    results.appendChild(div);
    console.log(message);
}

function clearLog() {
    document.getElementById('results').innerHTML = '';
}

async function runTests() {
    clearLog();
    log('🚀 Iniciando diagnóstico...', 'info');
    
    // Test 1: Verificar credenciales
    log('📋 Test 1: Verificando credenciales...');
    if (SUPABASE_URL && SUPABASE_KEY) {
        log('✅ URL y Key configuradas', 'pass');
        log(`URL: ${SUPABASE_URL}`);
        log(`Key: ${SUPABASE_KEY.substring(0, 20)}...`);
    } else {
        log('❌ Credenciales faltantes', 'fail');
        return;
    }
    
    // Test 2: Conectividad básica
    log('🌐 Test 2: Verificando conectividad...');
    try {
        const response = await fetch(SUPABASE_URL + '/rest/v1/', {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY
            }
        });
        
        if (response.ok) {
            log('✅ Conexión exitosa a Supabase', 'pass');
        } else {
            log(`❌ Error HTTP ${response.status}: ${response.statusText}`, 'fail');
            log(`<pre>${await response.text()}</pre>`);
        }
    } catch (error) {
        log(`❌ Error de red: ${error.message}`, 'fail');
        return;
    }
    
    // Test 3: Verificar tabla quiz_events
    log('🗄️ Test 3: Verificando tabla quiz_events...');
    try {
        const response = await fetch(SUPABASE_URL + '/rest/v1/quiz_events?limit=1', {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                'Content-Type': 'application/json'
            }
        });
        
        if (response.ok) {
            const data = await response.json();
            log('✅ Tabla quiz_events accesible', 'pass');
            log(`Registros encontrados: ${data.length}`);
            if (data.length > 0) {
                log(`<pre>${JSON.stringify(data[0], null, 2)}</pre>`);
            }
        } else {
            log(`❌ Error accediendo a quiz_events: ${response.status}`, 'fail');
            if (response.status === 404) {
                log('💡 La tabla quiz_events no existe. ¿Ejecutaste el script SQL?', 'warn');
            }
            log(`<pre>${await response.text()}</pre>`);
        }
    } catch (error) {
        log(`❌ Error accediendo tabla: ${error.message}`, 'fail');
    }
    
    // Test 4: Verificar permisos de escritura
    log('📝 Test 4: Verificando permisos de escritura...');
    await createTestEvent();
}

async function createTestEvent() {
    try {
        const testPayload = {
            room: 'DIAGNOSTICO',
            payload: JSON.stringify({
                type: 'TEST',
                message: 'Evento de prueba',
                timestamp: new Date().toISOString()
            }),
            ts: Date.now()
        };
        
        log('📤 Enviando evento de prueba...');
        
        const response = await fetch(SUPABASE_URL + '/rest/v1/quiz_events', {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify(testPayload)
        });
        
        if (response.ok) {
            log('✅ Evento enviado correctamente', 'pass');
        } else {
            log(`❌ Error enviando evento: ${response.status}`, 'fail');
            const errorText = await response.text();
            log(`<pre>${errorText}</pre>`);
            
            if (response.status === 401) {
                log('💡 Error de autenticación. Verifica la API Key.', 'warn');
            } else if (response.status === 403) {
                log('💡 Sin permisos. ¿Configuraste las políticas RLS?', 'warn');
            }
        }
    } catch (error) {
        log(`❌ Error enviando evento: ${error.message}`, 'fail');
    }
}

async function readEvents() {
    try {
        log('📥 Leyendo eventos recientes...');
        
        const response = await fetch(SUPABASE_URL + '/rest/v1/quiz_events?order=created_at.desc&limit=5', {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY
            }
        });
        
        if (response.ok) {
            const data = await response.json();
            log(`✅ ${data.length} eventos encontrados`, 'pass');
            
            if (data.length > 0) {
                data.forEach((event, i) => {
                    log(`<pre>Evento ${i + 1}:
Room: ${event.room}
Payload: ${event.payload}
Timestamp: ${event.created_at}
---</pre>`);
                });
            } else {
                log('ℹ️ No hay eventos en la base de datos', 'warn');
            }
        } else {
            log(`❌ Error leyendo eventos: ${response.status}`, 'fail');
            log(`<pre>${await response.text()}</pre>`);
        }
    } catch (error) {
        log(`❌ Error leyendo eventos: ${error.message}`, 'fail');
    }
}

// Auto-test al cargar la página
window.onload = () => {
    log('🔧 Herramienta de diagnóstico cargada');
    log('💡 Haz clic en "▶ Ejecutar Diagnóstico" para comenzar');
};
</script>
</body>
</html>
