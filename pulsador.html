<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Desafío Bíblico — Pulsador</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#07080F; --surface:#1A1C2A;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --white:#F6F4FF; --muted:rgba(246,244,255,0.45); --dim:rgba(246,244,255,0.22);
  --gold:#F5C842; --gold-glow:rgba(245,200,66,0.3);
  --violet:#7C6FFF; --violet-l:#9D93FF; --violet-glow:rgba(124,111,255,0.25);
  --green:#34D399; --green-glow:rgba(52,211,153,0.3); --green-border:rgba(52,211,153,0.4);
  --blue:#60A5FA; --blue-glow:rgba(96,165,250,0.3); --blue-border:rgba(96,165,250,0.4);
  --red:#F87171;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;touch-action:none;background:var(--ink);}
body{font-family:'Syne',sans-serif;color:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:space-between;height:100vh;padding:20px 16px;}

/* BG */
#bgC{position:fixed;inset:0;z-index:0;}
.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(100px);animation:orb-drift 22s ease-in-out infinite;}
.orb1{width:500px;height:500px;background:rgba(124,111,255,0.07);top:-200px;left:-150px;animation-delay:0s;}
.orb2{width:400px;height:400px;background:rgba(255,59,139,0.05);bottom:-160px;right:-120px;animation-delay:-9s;}
@keyframes orb-drift{0%,100%{transform:translate(0,0)}40%{transform:translate(35px,-25px)}70%{transform:translate(-20px,18px)}}

.wrap{position:relative;z-index:2;width:100%;max-width:480px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:10px;padding-bottom:8px;}

/* ── HEADER ── */
.hdr{text-align:center;flex-shrink:0;animation:fade-up .8s ease-out both;}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,5vw,32px);font-weight:700;color:var(--white);letter-spacing:0.04em;}
.hdr-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(13px,2.5vw,16px);color:var(--muted);margin-top:4px;}
@keyframes fade-up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── MODE TABS ── */
.mode-tabs{display:flex;gap:6px;justify-content:center;flex-shrink:0;}
.mtab{
  padding:6px 18px;border-radius:100px;font-size:10px;letter-spacing:0.15em;
  cursor:pointer;border:1px solid var(--border2);background:transparent;
  color:var(--dim);font-family:'Syne',sans-serif;font-weight:700;transition:all .2s;
}
.mtab.active{background:rgba(245,200,66,0.12);border-color:var(--gold);color:var(--gold);}

/* ── SETUP PANEL ── */
.setup-panel{
  width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border2);
  border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:12px;
  animation:fade-up .4s ease-out both;
}
.setup-label{font-size:10px;letter-spacing:0.25em;color:var(--muted);text-align:center;font-weight:700;}
.room-input{
  background:rgba(255,255,255,.07);border:1px solid var(--border2);border-radius:10px;
  color:var(--white);padding:11px 14px;font-family:'Syne',sans-serif;font-size:14px;
  font-weight:700;width:100%;outline:none;text-align:center;letter-spacing:0.1em;transition:border-color .2s;
}
.room-input:focus{border-color:var(--gold);}
.room-input::placeholder{color:var(--dim);letter-spacing:.05em;font-weight:600;}
.setup-note{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--dim);text-align:center;line-height:1.5;font-style:italic;}
.connect-btn{
  background:linear-gradient(135deg,#F5C842,#C9A12F);color:#07080F;
  border:none;border-radius:10px;padding:12px;font-family:'Syne',sans-serif;
  font-size:13px;font-weight:800;cursor:pointer;letter-spacing:0.1em;width:100%;
  transition:filter .15s,transform .1s;
}
.connect-btn:active{transform:scale(.98);}
.disconnect-btn{
  background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.35);color:var(--red);
  border-radius:10px;padding:11px;font-family:'Syne',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.1em;width:100%;transition:filter .15s;
}
.room-active-badge{
  background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);
  border-radius:10px;padding:12px;text-align:center;
}
.room-active-code{font-size:18px;font-weight:800;color:var(--green);letter-spacing:0.1em;}
.room-active-label{font-size:10px;color:rgba(52,211,153,0.7);margin-top:3px;letter-spacing:0.15em;}

/* ── TEAM PICK ── */
.team-area{
  display:flex;gap:16px;align-items:stretch;justify-content:center;
  flex-shrink:0;width:100%;
}
.team-btn{
  flex:1;border-radius:14px;padding:14px 12px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  cursor:pointer;transition:all .25s;text-align:center;
  font-family:'Syne',sans-serif;
}
.team-btn:active{transform:scale(.97);}
.team-btn-name{font-size:clamp(12px,3vw,16px);font-weight:800;letter-spacing:0.06em;margin-bottom:4px;}
.team-btn-action{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(11px,2.5vw,14px);color:var(--muted);}
.team-btn.ta-sel{background:rgba(52,211,153,0.1);border-color:var(--green-border);}
.team-btn.ta-sel .team-btn-name{color:var(--green);}
.team-btn.tb-sel{background:rgba(96,165,250,0.1);border-color:var(--blue-border);}
.team-btn.tb-sel .team-btn-name{color:var(--blue);}
.team-btn-label-a{color:var(--green);}
.team-btn-label-b{color:var(--blue);}

/* ── BUZZER ── */
.bz-area{display:flex;align-items:center;justify-content:center;width:100%;flex-shrink:0;margin:auto 0;}
.bz-btn{
  position:relative;
  width:min(62vw,42vh,260px);height:min(62vw,42vh,260px);
  border-radius:50%;cursor:pointer;user-select:none;-webkit-user-select:none;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;
  border:none;outline:none;touch-action:none;
  transition:transform .1s,filter .2s;
}
.bz-btn:active{transform:scale(.92);}

/* States */
.bz-btn.nt{
  background:radial-gradient(circle at 35% 35%,#2a2a38,#161620,#0a0a12);
  box-shadow:0 8px 40px rgba(0,0,0,.6),inset 0 2px 0 rgba(255,255,255,.06),inset 0 -5px 0 rgba(0,0,0,.4);
  cursor:not-allowed;
}
.bz-btn.ba{
  background:radial-gradient(circle at 35% 35%,#3DB578,#1B6B3A,#0D3A1E);
  box-shadow:0 0 0 10px rgba(52,211,153,.08),0 0 0 20px rgba(52,211,153,.04),0 8px 60px rgba(52,211,153,.4),inset 0 2px 0 rgba(255,255,255,.18),inset 0 -5px 0 rgba(0,0,0,.3);
  animation:pulse-a 2s ease-in-out infinite;
}
.bz-btn.bb{
  background:radial-gradient(circle at 35% 35%,#5DAEE8,#1A3A6B,#0D1E3A);
  box-shadow:0 0 0 10px rgba(96,165,250,.08),0 0 0 20px rgba(96,165,250,.04),0 8px 60px rgba(96,165,250,.4),inset 0 2px 0 rgba(255,255,255,.18),inset 0 -5px 0 rgba(0,0,0,.3);
  animation:pulse-b 2s ease-in-out infinite;
}
.bz-btn.dis{filter:grayscale(.7) brightness(.45)!important;animation:none!important;cursor:not-allowed!important;}
@keyframes pulse-a{0%,100%{box-shadow:0 0 0 10px rgba(52,211,153,.08),0 0 0 20px rgba(52,211,153,.04),0 8px 60px rgba(52,211,153,.4),inset 0 2px 0 rgba(255,255,255,.18),inset 0 -5px 0 rgba(0,0,0,.3)}50%{box-shadow:0 0 0 16px rgba(52,211,153,.12),0 0 0 32px rgba(52,211,153,.06),0 8px 90px rgba(52,211,153,.75),inset 0 2px 0 rgba(255,255,255,.18),inset 0 -5px 0 rgba(0,0,0,.3)}}
@keyframes pulse-b{0%,100%{box-shadow:0 0 0 10px rgba(96,165,250,.08),0 0 0 20px rgba(96,165,250,.04),0 8px 60px rgba(96,165,250,.4),inset 0 2px 0 rgba(255,255,255,.18),inset 0 -5px 0 rgba(0,0,0,.3)}50%{box-shadow:0 0 0 16px rgba(96,165,250,.12),0 0 0 32px rgba(96,165,250,.06),0 8px 90px rgba(96,165,250,.75),inset 0 2px 0 rgba(255,255,255,.18),inset 0 -5px 0 rgba(0,0,0,.3)}}

.bz-label{
  font-family:'Syne',sans-serif;font-size:clamp(18px,5vw,28px);font-weight:800;
  letter-spacing:0.1em;pointer-events:none;text-shadow:0 2px 10px rgba(0,0,0,.5);color:var(--white);
}
.bz-hint{
  font-family:'Cormorant Garamond',serif;font-size:clamp(12px,2.8vw,16px);
  font-style:italic;opacity:.7;pointer-events:none;color:var(--white);
}

/* Ripple */
.rip{position:absolute;border-radius:50%;animation:rip-out .65s ease-out forwards;pointer-events:none;}
@keyframes rip-out{0%{transform:scale(0);opacity:.5}100%{transform:scale(4);opacity:0}}

/* ── TRIGGER OVERLAY ── */
.trig{
  position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.trig.show{opacity:1;pointer-events:all;}
.trig.ta{background:radial-gradient(ellipse,rgba(20,80,45,.96),rgba(7,8,15,.99));}
.trig.tb{background:radial-gradient(ellipse,rgba(20,40,80,.96),rgba(7,8,15,.99));}
.trig-cross{width:48px;height:48px;margin-bottom:8px;opacity:.6;animation:scale-in .6s cubic-bezier(.34,1.56,.64,1);}
@keyframes scale-in{0%{transform:scale(0)}100%{transform:scale(1)}}
.trig-name{
  font-family:'Cormorant Garamond',serif;font-size:clamp(32px,10vw,72px);font-weight:700;
  text-align:center;animation:scale-in .5s .1s cubic-bezier(.34,1.56,.64,1) both;
}
.trig-msg{font-family:'Cormorant Garamond',serif;font-size:clamp(16px,3.5vw,24px);font-style:italic;text-align:center;opacity:.8;}
.trig-wait{font-size:clamp(10px,2.2vw,13px);color:var(--dim);letter-spacing:0.2em;margin-top:6px;}

/* ── STATUS BAR ── */
.status-bar{
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  padding:8px 18px;background:rgba(255,255,255,.04);
  border:1px solid var(--border);border-radius:100px;
}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;}
.sdot.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:status-pulse 1.4s infinite;}
@keyframes status-pulse{0%,100%{opacity:1}50%{opacity:.35}}
.stxt{font-size:11px;color:var(--muted);letter-spacing:0.12em;font-weight:700;}

/* ── RESPONSIVE ── */
@media (max-width:480px){
  body{padding:12px 10px;}
  .wrap{gap:8px;}
  .bz-btn{width:min(65vw,38vh,240px);height:min(65vw,38vh,240px);}
  .hdr-title{font-size:clamp(18px,4vw,26px);}
  .team-btn{padding:10px 8px;}
}
@media (max-height:700px){
  .bz-btn{width:min(55vw,36vh,220px);height:min(55vw,36vh,220px);}
  .wrap{gap:6px;}
}
</style>
</head>
<body>
<canvas id="bgC"></canvas>
<div class="ambient"><div class="orb orb1"></div><div class="orb orb2"></div></div>

<!-- TRIGGER OVERLAY -->
<div class="trig" id="trigOv">
  <svg class="trig-cross" viewBox="0 0 48 48" fill="none">
    <rect x="20" y="2" width="8" height="44" rx="4" fill="white"/>
    <rect x="2" y="16" width="44" height="8" rx="4" fill="white"/>
  </svg>
  <div class="trig-name" id="trigName">EQUIPO A</div>
  <div class="trig-msg">Primero en responder</div>
  <div class="trig-wait">Aguardando al moderador...</div>
</div>

<div class="wrap">
  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-title">Desafío Bíblico</div>
    <div class="hdr-sub">Seleccioná tu equipo y pulsá cuando puedas responder</div>
  </div>

  <!-- MODE TABS -->
  <div class="mode-tabs">
    <button class="mtab active" id="tabLocal" onclick="setMode('local')">LOCAL</button>
    <button class="mtab" id="tabNet" onclick="setMode('net')">EN RED</button>
  </div>

  <!-- SETUP PANEL (net) -->
  <div class="setup-panel" id="setupPanel" style="display:none;">
    <div class="setup-label">CÓDIGO DE SALA</div>
    <input class="room-input" id="roomCodeInput" type="text" placeholder="Ej: IGLESIA2025" maxlength="20" oninput="this.value=this.value.toUpperCase()">
    <button class="connect-btn" onclick="connectNet()">Conectar</button>
    <div class="setup-note">El moderador debe activar la misma sala desde su pantalla.</div>
  </div>

  <!-- CONNECTED PANEL -->
  <div class="setup-panel" id="disconnectPanel" style="display:none;">
    <div class="room-active-badge">
      <div class="room-active-code" id="connectedRoom">—</div>
      <div class="room-active-label">SALA ACTIVA</div>
    </div>
    <button class="disconnect-btn" onclick="disconnectNet()">Desconectar</button>
  </div>

  <!-- TEAM PICK -->
  <div class="team-area">
    <div class="team-btn" id="pickA" onclick="pickTeam('a')">
      <div class="team-btn-name team-btn-label-a" id="lbA">EQUIPO A</div>
      <div class="team-btn-action">Soy de este equipo</div>
    </div>
    <div style="display:flex;align-items:center;color:var(--dim);font-size:14px;font-weight:700;">—</div>
    <div class="team-btn" id="pickB" onclick="pickTeam('b')">
      <div class="team-btn-name team-btn-label-b" id="lbB">EQUIPO B</div>
      <div class="team-btn-action">Soy de este equipo</div>
    </div>
  </div>

  <!-- BUZZER -->
  <div class="bz-area">
    <button class="bz-btn nt" id="bzBtn" onpointerdown="trigBz(event)">
      <div class="bz-label">PULSAR</div>
      <div class="bz-hint" id="bzHint">Elegí tu equipo primero</div>
    </button>
  </div>

  <!-- STATUS -->
  <div class="status-bar">
    <div class="sdot" id="sDot"></div>
    <div class="stxt" id="sTxt">ESPERANDO MODERADOR</div>
  </div>
</div>

<script>
/* ── STATE ── */
const ST={team:null,enabled:false,triggered:false,nameA:'EQUIPO A',nameB:'EQUIPO B',mode:'local',room:'',connected:false};

/* ── SUPABASE ── */
const SUPABASE_URL='https://cnazxzkbckpqficngjex.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYXp4emtiY2twcWZpY25namV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjA4OTIsImV4cCI6MjA5MTQ5Njg5Mn0.7b6G0O107iGSSYpDwKXd9LTcNRdey3XbQN5ielqbFZw';
let pollInterval=null, lastTs=Date.now();

async function sendToNet(msg){
  if(!ST.room) return;
  try{
    const tagged={...msg,_sender:'puls'};
    await fetch(`${SUPABASE_URL}/rest/v1/quiz_events`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
      body:JSON.stringify({room:ST.room,payload:JSON.stringify(tagged),ts:Date.now()})
    });
  }catch(e){}
}

async function pollNet(){
  if(!ST.room) return;
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/quiz_events?room=eq.${ST.room}&ts=gt.${lastTs}&order=ts.asc`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    if(!r.ok) return;
    const data=await r.json();
    if(Array.isArray(data)&&data.length){
      data.forEach(row=>{try{handleMsg(JSON.parse(row.payload));}catch(e){}});
      lastTs=data[data.length-1].ts;
    }
  }catch(e){}
}

async function fetchStateSnapshot(room){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/quiz_state?room=eq.${room}`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    const data=await r.json();
    if(Array.isArray(data)&&data.length) handleMsg(JSON.parse(data[0].payload));
  }catch(e){}
}

/* ── LOCAL CHANNEL ── */
const localCh=new BroadcastChannel('quiz_channel');
localCh.onmessage=e=>handleMsg(e.data);

/* ── HANDLE MESSAGES ── */
function handleMsg(m){
  // Strip internal sender tag
  const type=m.type;
  switch(type){
    case 'SHOW_QUESTION':
      enableBz();
      break;
    case 'HIDE_QUESTION':
    case 'CLEAR_ACTIVE':
      resetBz();
      break;
    case 'WRONG_ANSWER':
      disableBz('Respuesta incorrecta');
      break;
    case 'PASS_TURN':
      // Only enable if we are the team that gets the turn
      if(ST.team===m.toTeam){
        enableBz();
      } else {
        disableBz('Turno del otro equipo');
      }
      break;
    case 'SHOW_ANSWER':
      disableBz('Respuesta revelada');
      break;
    case 'STOP_TIMER':
      disableBz('Tiempo terminado');
      break;
    case 'BUZZER_HIT':
      if(!ST.triggered) disableBz((m.name||'Otro equipo')+' pulsó primero');
      break;
    case 'UPDATE_TEAMS':
    case 'STATE_SNAPSHOT':
      if(m.nameA){ST.nameA=m.nameA;document.getElementById('lbA').textContent=m.nameA;}
      if(m.nameB){ST.nameB=m.nameB;document.getElementById('lbB').textContent=m.nameB;}
      break;
  }
}

/* ── NETWORK CONNECTION ── */
function connectNet(){
  const code=document.getElementById('roomCodeInput').value.trim();
  if(!code){document.getElementById('sTxt').textContent='INGRESA UN CÓDIGO DE SALA';return;}
  document.getElementById('sTxt').textContent='CONECTANDO...';
  ST.room=code; ST.connected=true; lastTs=Date.now();
  if(pollInterval) clearInterval(pollInterval);

  const controller=new AbortController();
  const tid=setTimeout(()=>controller.abort(),10000);

  fetch(`${SUPABASE_URL}/rest/v1/quiz_events?limit=1`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
    signal:controller.signal
  }).then(r=>{
    clearTimeout(tid);
    if(r.ok){
      pollInterval=setInterval(pollNet,1200);
      document.getElementById('sTxt').textContent='SALA: '+code;
      document.getElementById('sDot').className='sdot on';
      document.getElementById('setupPanel').style.display='none';
      document.getElementById('disconnectPanel').style.display='flex';
      document.getElementById('connectedRoom').textContent=code;
      fetchStateSnapshot(code);
      if('vibrate' in navigator) navigator.vibrate([150,80,150]);
    } else {
      document.getElementById('sTxt').textContent='ERROR DE CONEXIÓN';
      ST.room=''; ST.connected=false;
    }
  }).catch(err=>{
    clearTimeout(tid);
    document.getElementById('sTxt').textContent=err.name==='AbortError'?'CONEXIÓN LENTA':'SIN CONEXIÓN';
    ST.room=''; ST.connected=false;
  });
}

function disconnectNet(){
  if(pollInterval) clearInterval(pollInterval);
  ST.room=''; ST.connected=false;
  document.getElementById('sTxt').textContent='ESPERANDO MODERADOR';
  document.getElementById('sDot').className='sdot';
  document.getElementById('disconnectPanel').style.display='none';
  document.getElementById('setupPanel').style.display='flex';
}

/* ── BROADCAST BUZZER ── */
function broadcastBuzzer(msg){
  // Send locally (same browser/same origin)
  localCh.postMessage(msg);
  // Send to Supabase room so moderador picks it up and rebroadcasts to display
  if(ST.room) sendToNet(msg);
}

/* ── MODE ── */
function setMode(m){
  ST.mode=m;
  document.getElementById('tabLocal').className='mtab'+(m==='local'?' active':'');
  document.getElementById('tabNet').className='mtab'+(m==='net'?' active':'');
  if(m==='net'){
    document.getElementById('setupPanel').style.display='flex';
    document.getElementById('disconnectPanel').style.display='none';
    document.getElementById('sTxt').textContent='INGRESA EL CÓDIGO DE SALA';
  } else {
    document.getElementById('setupPanel').style.display='none';
    document.getElementById('disconnectPanel').style.display='none';
    document.getElementById('sTxt').textContent='MODO LOCAL';
    if(ST.connected) disconnectNet();
  }
}

/* ── TEAM PICK ── */
function pickTeam(t){
  ST.team=t;
  document.getElementById('pickA').className='team-btn'+(t==='a'?' ta-sel':'');
  document.getElementById('pickB').className='team-btn'+(t==='b'?' tb-sel':'');
  updBtn();
}

function updBtn(){
  const btn=document.getElementById('bzBtn');
  btn.className='bz-btn';
  if(!ST.team){
    btn.classList.add('nt');
    document.getElementById('bzHint').textContent='Elegí tu equipo primero';
  } else if(!ST.enabled){
    btn.classList.add(ST.team==='a'?'ba':'bb');
    btn.classList.add('dis');
    document.getElementById('bzHint').textContent='Esperando la pregunta...';
  } else {
    btn.classList.add(ST.team==='a'?'ba':'bb');
    document.getElementById('bzHint').textContent='Pulsá ahora';
  }
}

function enableBz(){
  ST.enabled=true; ST.triggered=false;
  document.getElementById('sDot').className='sdot on';
  document.getElementById('sTxt').textContent='BUZZER HABILITADO';
  if(ST.team) document.getElementById('bzBtn').classList.remove('dis');
  updBtn();
}
function disableBz(msg){
  ST.enabled=false; updBtn();
  document.getElementById('bzBtn').classList.add('dis');
  document.getElementById('sDot').className='sdot';
  document.getElementById('sTxt').textContent=msg||'ESPERANDO MODERADOR';
}
function resetBz(){
  ST.triggered=false; ST.enabled=false;
  document.getElementById('trigOv').className='trig';
  disableBz('ESPERANDO MODERADOR'); updBtn();
}

/* ── BUZZER TRIGGER ── */
function trigBz(e){
  if(!ST.team||!ST.enabled||ST.triggered) return;
  e.preventDefault();
  ST.triggered=true; ST.enabled=false;

  // Ripple
  const btn=document.getElementById('bzBtn');
  const rect=btn.getBoundingClientRect();
  const x=(e.clientX||rect.left+rect.width/2)-rect.left;
  const y=(e.clientY||rect.top+rect.height/2)-rect.top;
  const rip=document.createElement('div');
  rip.className='rip';
  rip.style.cssText=`left:${x}px;top:${y}px;width:80px;height:80px;margin:-40px;background:${ST.team==='a'?'rgba(52,211,153,.4)':'rgba(96,165,250,.4)'};`;
  btn.appendChild(rip);
  setTimeout(()=>rip.remove(),700);

  playBz();
  const name=ST.team==='a'?ST.nameA:ST.nameB;
  broadcastBuzzer({type:'BUZZER_HIT',team:ST.team,name});

  // Trigger overlay
  const ov=document.getElementById('trigOv');
  const tn=document.getElementById('trigName');
  tn.textContent=name;
  tn.style.color=ST.team==='a'?'var(--green)':'var(--blue)';
  ov.className='trig show t'+(ST.team);
  document.getElementById('sDot').className='sdot';
  document.getElementById('sTxt').textContent=name+' — BUZZEÓ';
  if('vibrate' in navigator) navigator.vibrate([200,80,200]);
  setTimeout(()=>{ov.className='trig';},4500);
}

/* ── AUDIO ── */
const AC=new(window.AudioContext||window.webkitAudioContext)();
document.addEventListener('pointerdown',()=>{if(AC.state==='suspended')AC.resume();},{once:true});
function playBz(){
  if(AC.state==='suspended') AC.resume();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type='square';o.frequency.setValueAtTime(1100,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(550,AC.currentTime+.15);
  g.gain.setValueAtTime(.5,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.4);
  o.start();o.stop(AC.currentTime+.45);
}

/* ── CANVAS BG ── */
const bgC=document.getElementById('bgC'),ctx=bgC.getContext('2d');
let pts=[];
function initBg(){
  bgC.width=window.innerWidth;bgC.height=window.innerHeight;pts=[];
  const n=Math.floor(bgC.width*bgC.height/20000);
  for(let i=0;i<n;i++) pts.push({x:Math.random()*bgC.width,y:Math.random()*bgC.height,vx:(Math.random()-.5)*.12,vy:(Math.random()-.5)*.12,r:Math.random()*1.2+.3,phase:Math.random()*Math.PI*2,speed:Math.random()*.004+.002,hue:[250,330,48][Math.floor(Math.random()*3)]});
}
function drawBg(){
  ctx.clearRect(0,0,bgC.width,bgC.height);
  pts.forEach(p=>{
    p.phase+=p.speed;p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=bgC.width;if(p.x>bgC.width)p.x=0;
    if(p.y<0)p.y=bgC.height;if(p.y>bgC.height)p.y=0;
    const a=(Math.sin(p.phase)+1)/2*.28+.04;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`hsla(${p.hue},75%,70%,${a})`;ctx.fill();
  });
  requestAnimationFrame(drawBg);
}
window.addEventListener('resize',initBg);
initBg();drawBg();
</script>
