<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Desafío Bíblico — Pulsador</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4A843;
    --gold-light: #F0C96A;
    --deep: #080810;
    --green: #2ECC71;
    --green-dark: #1A5E35;
    --green-glow: rgba(46,204,113,0.5);
    --blue: #3498DB;
    --blue-dark: #1A3A6B;
    --blue-glow: rgba(52,152,219,0.5);
    --white: #FDFAF2;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; touch-action:none; }

  body {
    background: var(--deep);
    font-family: 'Cinzel', serif;
    color: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    height: 100vh;
    padding: 20px;
    gap: 10px;
  }

  /* BG */
  canvas#bg { position:fixed;inset:0;z-index:0; }

  .content { position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:10px; }

  /* HEADER */
  .header {
    text-align: center;
    flex-shrink: 0;
  }
  .header-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(14px, 3vw, 22px);
    color: var(--gold-light);
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(212,168,67,0.5);
  }
  .header-sub {
    font-family: 'Crimson Text', serif;
    font-size: clamp(12px, 2vw, 16px);
    color: rgba(255,255,255,0.4);
    margin-top: 4px;
    font-style: italic;
  }

  /* TEAM SELECTOR */
  .team-select-area {
    display: flex;
    gap: 16px;
    flex-shrink: 0;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }
  .team-pick {
    padding: 10px 28px;
    border-radius: 40px;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.3s;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.5);
    user-select: none;
  }
  .team-pick:hover { opacity: 0.85; }
  .team-pick.selected-a {
    background: rgba(27,107,58,0.4);
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 20px rgba(46,204,113,0.4);
  }
  .team-pick.selected-b {
    background: rgba(26,58,107,0.4);
    border-color: var(--blue);
    color: var(--blue);
    box-shadow: 0 0 20px rgba(52,152,219,0.4);
  }
  .team-label {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(13px, 2vw, 17px);
    text-align: center;
    letter-spacing: 1px;
  }

  /* BUZZER BUTTON */
  .buzzer-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .buzzer-btn {
    position: relative;
    width: min(70vw, 70vh, 340px);
    height: min(70vw, 70vh, 340px);
    border-radius: 50%;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: transform 0.1s, filter 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    border: none;
    outline: none;
    touch-action: none;
  }
  .buzzer-btn:active { transform: scale(0.93); }

  .buzzer-btn.team-a-btn {
    background: radial-gradient(circle at 35% 35%, #3DB578, #1B6B3A, #0D3A1E);
    box-shadow:
      0 0 0 8px rgba(46,204,113,0.1),
      0 0 0 16px rgba(46,204,113,0.06),
      0 8px 60px rgba(46,204,113,0.4),
      inset 0 3px 0 rgba(255,255,255,0.2),
      inset 0 -6px 0 rgba(0,0,0,0.3);
    animation: pulseA 2s ease-in-out infinite;
  }
  .buzzer-btn.team-b-btn {
    background: radial-gradient(circle at 35% 35%, #5DAEE8, #1A3A6B, #0D1E3A);
    box-shadow:
      0 0 0 8px rgba(52,152,219,0.1),
      0 0 0 16px rgba(52,152,219,0.06),
      0 8px 60px rgba(52,152,219,0.4),
      inset 0 3px 0 rgba(255,255,255,0.2),
      inset 0 -6px 0 rgba(0,0,0,0.3);
    animation: pulseB 2s ease-in-out infinite;
  }
  .buzzer-btn.no-team {
    background: radial-gradient(circle at 35% 35%, #3a3a4a, #1a1a2a, #0a0a10);
    box-shadow:
      0 0 0 8px rgba(255,255,255,0.04),
      0 8px 40px rgba(0,0,0,0.5),
      inset 0 3px 0 rgba(255,255,255,0.1),
      inset 0 -6px 0 rgba(0,0,0,0.3);
    cursor: not-allowed;
  }
  .buzzer-btn.disabled {
    filter: grayscale(0.7) brightness(0.6);
    cursor: not-allowed;
    animation: none !important;
  }

  @keyframes pulseA {
    0%,100% { box-shadow: 0 0 0 8px rgba(46,204,113,0.1), 0 0 0 16px rgba(46,204,113,0.06), 0 8px 60px rgba(46,204,113,0.4), inset 0 3px 0 rgba(255,255,255,0.2), inset 0 -6px 0 rgba(0,0,0,0.3); }
    50% { box-shadow: 0 0 0 12px rgba(46,204,113,0.15), 0 0 0 24px rgba(46,204,113,0.08), 0 8px 80px rgba(46,204,113,0.7), inset 0 3px 0 rgba(255,255,255,0.2), inset 0 -6px 0 rgba(0,0,0,0.3); }
  }
  @keyframes pulseB {
    0%,100% { box-shadow: 0 0 0 8px rgba(52,152,219,0.1), 0 0 0 16px rgba(52,152,219,0.06), 0 8px 60px rgba(52,152,219,0.4), inset 0 3px 0 rgba(255,255,255,0.2), inset 0 -6px 0 rgba(0,0,0,0.3); }
    50% { box-shadow: 0 0 0 12px rgba(52,152,219,0.15), 0 0 0 24px rgba(52,152,219,0.08), 0 8px 80px rgba(52,152,219,0.7), inset 0 3px 0 rgba(255,255,255,0.2), inset 0 -6px 0 rgba(0,0,0,0.3); }
  }

  .buzzer-icon { font-size: clamp(40px, 12vw, 80px); pointer-events: none; }
  .buzzer-text {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(14px, 3.5vw, 26px);
    font-weight: 900;
    letter-spacing: 3px;
    pointer-events: none;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }
  .buzzer-hint {
    font-family: 'Crimson Text', serif;
    font-size: clamp(11px, 2.5vw, 16px);
    opacity: 0.7;
    pointer-events: none;
    font-style: italic;
  }

  /* TRIGGERED STATE */
  .trigger-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .trigger-overlay.show { opacity: 1; pointer-events: all; }
  .trigger-overlay.team-a { background: radial-gradient(ellipse, rgba(27,107,58,0.95), rgba(8,8,16,0.98)); }
  .trigger-overlay.team-b { background: radial-gradient(ellipse, rgba(26,58,107,0.95), rgba(8,8,16,0.98)); }

  .trigger-icon { font-size: 80px; animation: triggerBounce 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes triggerBounce { 0%{transform:scale(0)} 100%{transform:scale(1)} }
  .trigger-team {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(28px, 8vw, 60px);
    font-weight: 900;
    text-align: center;
    animation: triggerBounce 0.5s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .trigger-msg {
    font-family: 'Crimson Text', serif;
    font-size: clamp(16px, 3vw, 24px);
    font-style: italic;
    text-align: center;
    opacity: 0.8;
  }
  .trigger-wait {
    font-size: clamp(12px, 2.5vw, 16px);
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    margin-top: 10px;
    font-style: italic;
    font-family: 'Crimson Text', serif;
  }

  /* STATUS bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    padding: 8px 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 30px;
  }
  .status-indicator { width:8px;height:8px;border-radius:50%;background:#E74C3C; }
  .status-indicator.enabled { background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1s infinite; }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
  .status-text { font-size:12px;color:rgba(255,255,255,0.5);letter-spacing:2px; }

  /* ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    animation: rippleAnim 0.6s ease-out forwards;
    pointer-events: none;
  }
  @keyframes rippleAnim {
    0% { transform:scale(0); opacity:0.5; }
    100% { transform:scale(4); opacity:0; }
  }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="trigger-overlay" id="triggerOverlay">
  <div class="trigger-icon">🔔</div>
  <div class="trigger-team" id="triggerTeam">EQUIPO A</div>
  <div class="trigger-msg">¡Pulsó primero!</div>
  <div class="trigger-wait">Esperando al moderador...</div>
</div>

<div class="content">
  <!-- HEADER -->
  <div class="header">
    <div class="header-title">✝ DESAFÍO BÍBLICO</div>
    <div class="header-sub">Selecciona tu equipo y pulsa cuando puedas responder</div>
  </div>

  <!-- TEAM SELECTOR -->
  <div class="team-select-area">
    <div>
      <div class="team-label" id="labelA" style="color:#2ECC71;margin-bottom:6px">EQUIPO A</div>
      <button class="team-pick" id="pickA" onclick="pickTeam('a')">Soy del Equipo A</button>
    </div>
    <div style="font-family:'Cinzel Decorative',serif;font-size:18px;color:rgba(212,168,67,0.5)">VS</div>
    <div>
      <div class="team-label" id="labelB" style="color:#3498DB;margin-bottom:6px">EQUIPO B</div>
      <button class="team-pick" id="pickB" onclick="pickTeam('b')">Soy del Equipo B</button>
    </div>
  </div>

  <!-- BUZZER -->
  <div class="buzzer-area">
    <button class="buzzer-btn no-team" id="buzzerBtn" onpointerdown="triggerBuzzer(event)">
      <div class="buzzer-icon">🔔</div>
      <div class="buzzer-text">PULSAR</div>
      <div class="buzzer-hint" id="buzzerHint">Elige tu equipo primero</div>
    </button>
  </div>

  <!-- STATUS -->
  <div class="status-bar">
    <div class="status-indicator" id="statusDot"></div>
    <div class="status-text" id="statusText">ESPERANDO MODERADOR</div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────
const state = {
  team: null,
  enabled: false,
  triggered: false,
  nameA: 'EQUIPO A',
  nameB: 'EQUIPO B',
};

// ─── Channel ─────────────────────────────────────────────────────────────
const ch = new BroadcastChannel('quiz_channel');

ch.onmessage = (e) => {
  const msg = e.data;
  switch(msg.type) {
    case 'SHOW_QUESTION':
      enableBuzzer();
      break;
    case 'HIDE_QUESTION':
    case 'CLEAR_ACTIVE':
      resetBuzzer();
      break;
    case 'BUZZER_HIT':
      // If someone else buzzed
      if (!state.triggered) {
        disableBuzzer(`🔔 ${msg.name || 'Otro equipo'} pulsó primero`);
      }
      break;
    case 'UPDATE_TEAMS':
      if (msg.nameA) { state.nameA = msg.nameA; document.getElementById('labelA').textContent = msg.nameA; }
      if (msg.nameB) { state.nameB = msg.nameB; document.getElementById('labelB').textContent = msg.nameB; }
      break;
    case 'STOP_TIMER':
      // don't auto-disable; moderator controls
      break;
  }
};

// ─── Functions ───────────────────────────────────────────────────────────
function pickTeam(team) {
  state.team = team;
  document.getElementById('pickA').className = 'team-pick' + (team === 'a' ? ' selected-a' : '');
  document.getElementById('pickB').className = 'team-pick' + (team === 'b' ? ' selected-b' : '');
  updateBuzzerAppearance();
}

function updateBuzzerAppearance() {
  const btn = document.getElementById('buzzerBtn');
  btn.className = 'buzzer-btn';
  if (!state.team) {
    btn.classList.add('no-team');
    document.getElementById('buzzerHint').textContent = 'Elige tu equipo primero';
  } else if (!state.enabled) {
    btn.classList.add(state.team === 'a' ? 'team-a-btn' : 'team-b-btn');
    btn.classList.add('disabled');
    document.getElementById('buzzerHint').textContent = 'Esperando la pregunta...';
  } else {
    btn.classList.add(state.team === 'a' ? 'team-a-btn' : 'team-b-btn');
    document.getElementById('buzzerHint').textContent = '¡PULSA AHORA!';
  }
}

function enableBuzzer() {
  state.enabled = true;
  state.triggered = false;
  updateBuzzerAppearance();
  document.getElementById('statusDot').classList.add('enabled');
  document.getElementById('statusText').textContent = '¡BUZZER HABILITADO!';
  // Remove disabled class if team selected
  const btn = document.getElementById('buzzerBtn');
  if (state.team) btn.classList.remove('disabled');
}

function disableBuzzer(msg) {
  state.enabled = false;
  updateBuzzerAppearance();
  const btn = document.getElementById('buzzerBtn');
  btn.classList.add('disabled');
  document.getElementById('statusDot').classList.remove('enabled');
  document.getElementById('statusText').textContent = msg || 'ESPERANDO MODERADOR';
}

function resetBuzzer() {
  state.triggered = false;
  state.enabled = false;
  const overlay = document.getElementById('triggerOverlay');
  overlay.className = 'trigger-overlay';
  disableBuzzer('ESPERANDO MODERADOR');
  // Remove disabled if team chosen - just show ready state
  updateBuzzerAppearance();
}

function triggerBuzzer(e) {
  if (!state.team || !state.enabled || state.triggered) return;
  e.preventDefault();
  state.triggered = true;
  state.enabled = false;

  // Ripple effect
  const btn = document.getElementById('buzzerBtn');
  const rect = btn.getBoundingClientRect();
  const x = (e.clientX || rect.left + rect.width/2) - rect.left;
  const y = (e.clientY || rect.top + rect.height/2) - rect.top;
  const ripple = document.createElement('div');
  const color = state.team === 'a' ? 'rgba(46,204,113,0.4)' : 'rgba(52,152,219,0.4)';
  ripple.className = 'ripple';
  ripple.style.cssText = `left:${x}px;top:${y}px;width:80px;height:80px;margin:-40px;background:${color};`;
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 700);

  // Sound
  playBuzzerSound();

  // Broadcast
  const name = state.team === 'a' ? state.nameA : state.nameB;
  ch.postMessage({ type: 'BUZZER_HIT', team: state.team, name });

  // Show overlay
  const overlay = document.getElementById('triggerOverlay');
  document.getElementById('triggerTeam').textContent = name;
  document.getElementById('triggerTeam').style.color = state.team === 'a' ? '#2ECC71' : '#3498DB';
  overlay.className = 'trigger-overlay show team-' + state.team;

  document.getElementById('statusDot').classList.remove('enabled');
  document.getElementById('statusText').textContent = `${name} — ¡BUZZEÓ!`;

  // Auto dismiss overlay after 4s
  setTimeout(() => {
    overlay.className = 'trigger-overlay';
  }, 4000);
}

// ─── Audio ────────────────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playBuzzerSound() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}
document.addEventListener('pointerdown', () => { if (audioCtx.state === 'suspended') audioCtx.resume(); }, {once:true});

// ─── Background ───────────────────────────────────────────────────────────
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
const stars = [];
function initBg() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars.length = 0;
  for (let i=0;i<80;i++) stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.2+0.3,a:Math.random(),s:Math.random()*0.008+0.003});
}
function drawBg() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const g = ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,Math.max(canvas.width,canvas.height)/1.4);
  g.addColorStop(0,'#0D1B3E'); g.addColorStop(1,'#050508');
  ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    s.a+=s.s;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(212,168,67,${(Math.sin(s.a)+1)/2*0.4+0.05})`; ctx.fill();
  });
  requestAnimationFrame(drawBg);
}
window.addEventListener('resize',initBg);
initBg(); drawBg();
</script>
</body>
</html>
